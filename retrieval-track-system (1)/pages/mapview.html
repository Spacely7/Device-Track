<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map View — Retrieval Track</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
/* ── LAYOUT ─────────────────────────────────────────────── */
.map-wrap{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
@media(max-width:860px){.map-wrap{grid-template-columns:1fr;}}

/* ── MAP CANVAS ─────────────────────────────────────────── */
.map-canvas{background:linear-gradient(145deg,#071525 0%,#0c1e36 60%,#081930 100%);
  border-radius:16px;border:1px solid var(--border);position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.3);}
.map-grid-overlay{position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,197,163,.035) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,197,163,.035) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;}
#ghana-svg{display:block;width:100%;height:auto;transition:transform .3s cubic-bezier(.4,0,.2,1);}

/* ── REGION PATHS ───────────────────────────────────────── */
.r{stroke:#ffffff22;stroke-width:.6;stroke-linejoin:round;cursor:pointer;
   transition:filter .15s,opacity .2s,stroke .15s;}
.r:hover{filter:brightness(1.5);stroke:#ffffff88;stroke-width:1;}
.r.sel{stroke:#00c5a3;stroke-width:1.5;filter:brightness(1.4);}
.r.dim{opacity:.3;}

/* ── PINS ───────────────────────────────────────────────── */
.pin{cursor:pointer;transition:transform .2s;}
.pin:hover{transform:scale(1.4);}
@keyframes ripple{0%{r:0;opacity:.6}100%{r:18;opacity:0}}

/* ── TOOLTIP ────────────────────────────────────────────── */
#tip{position:absolute;background:#07111f;border:1px solid #00c5a344;color:#fff;
  border-radius:10px;padding:10px 13px;font-size:12px;pointer-events:none;
  opacity:0;transition:opacity .15s;z-index:99;min-width:168px;
  box-shadow:0 8px 28px #0008;}
#tip.on{opacity:1;}
.tip-hd{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;
  color:#00c5a3;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #ffffff18;}
.tip-r{display:flex;justify-content:space-between;gap:10px;padding:1.5px 0;font-size:11px;}
.tip-v{font-weight:700;}
.tip-foot{margin-top:5px;padding-top:5px;border-top:1px solid #ffffff14;
  font-size:10px;color:#ffffff55;}

/* ── LEGEND ─────────────────────────────────────────────── */
.legend{position:absolute;bottom:14px;left:14px;
  background:rgba(5,12,26,.88);backdrop-filter:blur(6px);
  border:1px solid #ffffff15;border-radius:10px;padding:9px 13px;font-size:11px;color:#cdd;}
.lg{display:flex;align-items:center;gap:7px;padding:2px 0;}
.ld{width:10px;height:10px;border-radius:50%;border:1.5px solid #ffffff30;}

/* ── ZOOM ───────────────────────────────────────────────── */
.zoom-bar{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:4px;}
.zb{width:30px;height:30px;border-radius:7px;background:rgba(5,12,26,.85);
  backdrop-filter:blur(6px);border:1px solid #ffffff18;color:#fff;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .14s;font-weight:700;}
.zb:hover{background:rgba(0,197,163,.3);}

/* ── SIDEBAR ────────────────────────────────────────────── */
.side{display:flex;flex-direction:column;gap:13px;}
.sc{background:var(--card);border-radius:14px;border:1px solid var(--border);
  overflow:hidden;box-shadow:var(--shadow-sm);}
.sh{padding:11px 15px;border-bottom:1px solid var(--border);
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:space-between;}
.ms{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:11px;}
.mc{background:#f5f7fc;border-radius:9px;padding:9px 11px;text-align:center;}
body.dark .mc{background:#0e1628;}
.mv{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;line-height:1;}
.ml{font-size:9px;color:var(--text-muted);margin-top:2px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;}
.pills{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:3px 9px;border-radius:99px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-muted);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .13s;font-family:'DM Sans',sans-serif;}
.pill.on,.pill:hover{border-color:var(--accent);background:rgba(0,197,163,.09);color:#007a67;}
.di{display:flex;align-items:center;gap:9px;padding:8px 14px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;font-size:12px;}
.di:last-child{border-bottom:none;}
.di:hover{background:#f5f7ff;}
body.dark .di:hover{background:#1a2235;}
.di.hi{background:rgba(0,197,163,.08);}
.di-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.di-name{flex:1;font-weight:600;line-height:1.2;}
.di-reg{font-size:10px;color:var(--text-muted);}
.badge{padding:2px 6px;border-radius:99px;font-size:10px;font-weight:800;}
.ba{background:rgba(15,26,60,.08);color:var(--navy);}
body.dark .ba{background:rgba(100,140,255,.15);color:#7eb3ff;}
.bd{background:rgba(232,64,64,.1);color:var(--red);}
</style>
</head>
<body>
<button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">🗺️ Ghana Device Map</div>
      <div class="page-desc">Live deployment view across all 16 regions of Ghana.</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>

  <div class="map-wrap">

    <!-- ── MAP ── -->
    <div class="map-canvas" id="canvas">
      <div class="map-grid-overlay"></div>

      <svg id="ghana-svg" viewBox="120 50 340 440" xmlns="http://www.w3.org/2000/svg"></svg>

      <!-- tooltip -->
      <div id="tip">
        <div class="tip-hd" id="th"></div>
        <div class="tip-r"><span>Active</span><span class="tip-v" id="ta"></span></div>
        <div class="tip-r"><span style="color:#ff7070">Delayed</span><span class="tip-v" style="color:#ff7070" id="td2"></span></div>
        <div class="tip-r"><span>Retrieved</span><span class="tip-v" id="tr2"></span></div>
        <div class="tip-foot" id="tf"></div>
      </div>

      <!-- legend -->
      <div class="legend">
        <div class="lg"><div class="ld" style="background:#00c5a3"></div>1–2 devices</div>
        <div class="lg"><div class="ld" style="background:#f5c842"></div>3–5 devices</div>
        <div class="lg"><div class="ld" style="background:#e84040"></div>6+ / delayed</div>
        <div class="lg" style="margin-top:4px;padding-top:4px;border-top:1px solid #fff2">
          <div style="width:14px;height:8px;border-radius:3px;background:rgba(0,197,163,.28);flex-shrink:0"></div>
          Active region
        </div>
      </div>

      <!-- zoom controls -->
      <div class="zoom-bar">
        <button class="zb" onclick="doZoom(1.35)">+</button>
        <button class="zb" onclick="doZoom(0.74)">−</button>
        <button class="zb" onclick="resetZoom()" title="Fit">⤢</button>
      </div>
    </div>

    <!-- ── SIDEBAR ── -->
    <div class="side">

      <div class="sc">
        <div class="sh">📊 Overview</div>
        <div class="ms" id="ms"></div>
      </div>

      <div class="sc">
        <div class="sh">Filter pins</div>
        <div class="pills">
          <button class="pill on"  onclick="setF('all',this)">All</button>
          <button class="pill"     onclick="setF('delayed',this)">⚠️ Delayed</button>
          <button class="pill"     onclick="setF('pending',this)">⏳ Pending</button>
          <button class="pill"     onclick="setF('unconf',this)">🔍 Unconfirmed</button>
        </div>
      </div>

      <div class="sc" style="max-height:420px;overflow-y:auto;">
        <div class="sh">
          <span>📍 Destinations</span>
          <span id="dlbl" style="font-size:11px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-weight:400;"></span>
        </div>
        <div id="dlist"></div>
      </div>

    </div>
  </div>
</main>
<div id="toast"></div>

<script src="../js/db.js"></script>
<script src="../js/nav.js"></script>
<script>
'use strict';
const session = DB.requireAuth();
if (session){ DB.recalcDelays(); buildSidebar('mapview'); boot(); }

/* ═══════════════════════════════════════════════════════════
   GHANA REGIONS — 16 regions
   Real geographic outlines simplified & scaled to SVG space.
   ViewBox: "120 50 340 440"  (origin top-left Ghana ≈ 120,50)
   ═══════════════════════════════════════════════════════════ */
const REGIONS = [
  /* ── Upper West ── */
  { id:'upper-west', name:'Upper West', cap:'Wa',
    fill:'#1b2d42',
    d:'M 138,68 L 162,60 L 188,62 L 205,74 L 208,92 L 198,108 L 175,116 L 152,114 L 133,102 L 128,84 Z',
    lx:168, ly:90, dests:['Paga'] },

  /* ── Upper East ── */
  { id:'upper-east', name:'Upper East', cap:'Bolgatanga',
    fill:'#1e3345',
    d:'M 208,62 L 238,55 L 264,58 L 282,72 L 278,92 L 258,105 L 235,110 L 210,104 L 198,90 Z',
    lx:242, ly:82, dests:['Paga'] },

  /* ── North East ── */
  { id:'north-east', name:'North East', cap:'Nalerigu',
    fill:'#1f3548',
    d:'M 282,72 L 308,68 L 332,75 L 345,92 L 336,112 L 312,122 L 286,118 L 268,105 L 264,88 Z',
    lx:308, ly:96, dests:['Keda'] },

  /* ── Savannah ── */
  { id:'savannah', name:'Savannah', cap:'Damongo',
    fill:'#1c3040',
    d:'M 128,102 L 152,114 L 174,118 L 178,138 L 165,156 L 142,162 L 118,155 L 106,138 L 108,118 Z',
    lx:145, ly:135, dests:['Paga'] },

  /* ── Northern ── */
  { id:'northern', name:'Northern', cap:'Tamale',
    fill:'#244055',
    d:'M 175,116 L 198,108 L 210,116 L 235,110 L 258,118 L 270,136 L 262,158 L 240,170 L 215,175 L 188,170 L 165,158 L 162,140 Z',
    lx:218, ly:145, dests:['Paga','Newrest'] },

  /* ── Oti ── */
  { id:'oti', name:'Oti', cap:'Dambai',
    fill:'#1d3855',
    d:'M 286,118 L 312,122 L 336,132 L 348,152 L 340,175 L 318,188 L 294,188 L 272,175 L 265,155 L 272,138 Z',
    lx:310, ly:155, dests:['Keda'] },

  /* ── Bono ── */
  { id:'bono', name:'Bono', cap:'Sunyani',
    fill:'#1c4060',
    d:'M 140,165 L 162,158 L 185,165 L 190,185 L 182,205 L 160,214 L 138,210 L 122,196 L 120,178 Z',
    lx:158, ly:190, dests:['Daily food Limited'] },

  /* ── Bono East ── */
  { id:'bono-east', name:'Bono East', cap:'Techiman',
    fill:'#1e4262',
    d:'M 188,168 L 215,175 L 235,182 L 242,202 L 232,222 L 210,230 L 188,226 L 172,210 L 170,192 Z',
    lx:208, ly:202, dests:['Daily food Limited'] },

  /* ── Ahafo ── */
  { id:'ahafo', name:'Ahafo', cap:'Goaso',
    fill:'#185448',
    d:'M 120,195 L 138,210 L 142,228 L 128,242 L 108,244 L 94,232 L 92,214 L 102,200 Z',
    lx:118, ly:222, dests:['Newrest'] },

  /* ── Ashanti ── */
  { id:'ashanti', name:'Ashanti', cap:'Kumasi',
    fill:'#4a1f72',
    d:'M 158,215 L 180,212 L 210,230 L 232,240 L 240,260 L 228,278 L 205,285 L 180,282 L 158,268 L 145,248 L 145,230 Z',
    lx:192, ly:252, dests:['Kumasi','Daily food Limited'] },

  /* ── Western North ── */
  { id:'western-north', name:'Western North', cap:'Sefwi Wiawso',
    fill:'#185060',
    d:'M 92,242 L 110,245 L 128,256 L 132,278 L 122,298 L 100,308 L 78,302 L 64,286 L 62,265 L 74,248 Z',
    lx:100, ly:276, dests:['Sunda Ghana Ltd','Elubo'] },

  /* ── Eastern ── */
  { id:'eastern', name:'Eastern', cap:'Koforidua',
    fill:'#1a4878',
    d:'M 232,242 L 258,240 L 280,248 L 292,268 L 285,292 L 262,302 L 238,300 L 218,285 L 212,262 Z',
    lx:256, ly:272, dests:['Kumasi','Tema'] },

  /* ── Volta ── */
  { id:'volta', name:'Volta', cap:'Ho',
    fill:'#16544a',
    d:'M 295,192 L 318,188 L 340,198 L 352,222 L 348,252 L 330,272 L 305,280 L 282,270 L 270,248 L 272,222 L 282,204 Z',
    lx:315, ly:238, dests:['Keda'] },

  /* ── Central ── */
  { id:'central', name:'Central', cap:'Cape Coast',
    fill:'#155840',
    d:'M 140,300 L 162,298 L 185,302 L 205,312 L 210,332 L 198,348 L 174,355 L 150,348 L 132,332 L 128,312 Z',
    lx:170, ly:328, dests:['Spaceplast Gh Ltd'] },

  /* ── Western ── */
  { id:'western', name:'Western', cap:'Takoradi',
    fill:'#145838',
    d:'M 62,298 L 82,305 L 102,310 L 118,325 L 120,348 L 108,368 L 82,375 L 58,362 L 44,340 L 44,315 Z',
    lx:85,  ly:340, dests:['Takoradi','Elubo'] },

  /* ── Greater Accra ── */
  { id:'greater-accra', name:'Greater Accra', cap:'Accra',
    fill:'#0e5a45',
    d:'M 215,298 L 238,302 L 262,308 L 278,325 L 272,345 L 250,355 L 225,352 L 205,338 L 202,315 Z',
    lx:240, ly:328, dests:['Tema','Spaceplast Gh Ltd'] },
];

/* ── Destination → region lookup ── */
const D2R = {};
REGIONS.forEach(r => r.dests.forEach(d => { if(!D2R[d]) D2R[d]=r.id; }));

/* ── Pin pixel coords (match their region centres) ── */
const PIN = {
  'Elubo':              {x:74,  y:320},
  'Daily food Limited': {x:188, y:242},
  'Sunda Ghana Ltd':    {x:100, y:268},
  'Spaceplast Gh Ltd':  {x:220, y:342},
  'Newrest':            {x:118, y:228},
  'Paga':               {x:220, y:80 },
  'Keda':               {x:312, y:155},
  'Kumasi':             {x:195, y:258},
  'Tema':               {x:248, y:340},
  'Takoradi':           {x:86,  y:352},
};

/* ─── colour helpers ─── */
function bright(hex, f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>Math.min(255,Math.round(v*f)).toString(16).padStart(2,'0')).join('');
}
function pinColor(data){
  if(data.delayed>0||data.active>5) return '#e84040';
  if(data.active>2) return '#f5c842';
  return '#00c5a3';
}

/* ─── state ─── */
let filt='all', scale=1, selRegion=null;

/* ─── data helpers ─── */
function byDest(){
  const out={};
  DB.DESTS.forEach(d=>out[d]={active:0,delayed:0,retrieved:0,unconf:0});
  DB.getDevices().forEach(dev=>{
    if(!out[dev.dest]) return;
    if(dev.status==='Retrieved'){out[dev.dest].retrieved++;return;}
    out[dev.dest].active++;
    if(dev.isDelayed) out[dev.dest].delayed++;
    if(!dev.fieldConfirmed) out[dev.dest].unconf++;
  });
  return out;
}
function pinShown(d){
  if(filt==='all')     return d.active>0;
  if(filt==='delayed') return d.delayed>0;
  if(filt==='pending') return (d.active-d.delayed)>0;
  if(filt==='unconf')  return d.unconf>0;
}

/* ═══════════════════════════════════════════════════════════
   RENDER SVG
   ═══════════════════════════════════════════════════════════ */
function renderSVG(){
  const bd=byDest();

  /* region totals */
  const rt={};
  REGIONS.forEach(r=>{
    let ac=0,dl=0,rv=0;
    r.dests.forEach(d=>{if(bd[d]){ac+=bd[d].active;dl+=bd[d].delayed;rv+=bd[d].retrieved;}});
    rt[r.id]={ac,dl,rv};
  });

  const svg=document.getElementById('ghana-svg');

  /* ── region fills ── */
  const paths=REGIONS.map(r=>{
    const {ac,dl}=rt[r.id];
    let fill=r.fill;
    if(dl>0)      fill='#5a1818';
    else if(ac>0) fill=bright(r.fill,1.7);
    const dim = selRegion && selRegion!==r.id ? ' dim' : '';
    const sel = selRegion===r.id ? ' sel' : '';
    return `<path id="rp-${r.id}" class="r${dim}${sel}" d="${r.d}" fill="${fill}"
      onmouseenter="tipRegion(event,'${r.id}')" onmouseleave="tipOff()"
      onclick="clickRegion('${r.id}')"/>`;
  }).join('');

  /* ── region labels ── */
  const labels=REGIONS.map(r=>{
    const {ac}=rt[r.id];
    return `<text x="${r.lx}" y="${r.ly}" text-anchor="middle"
      font-family="DM Sans,sans-serif" font-size="${ac?6:5}"
      font-weight="${ac?700:400}"
      fill="rgba(255,255,255,${ac?.82:.32})"
      pointer-events="none">${r.name}</text>`;
  }).join('');

  /* ── pins ── */
  const pins=DB.DESTS.map(dest=>{
    const d=bd[dest]; if(!d||!pinShown(d)) return '';
    const p=PIN[dest]; if(!p) return '';
    const col=pinColor(d);
    const sz=Math.max(5,Math.min(13,5+d.active*1.4));
    /* pulsing ring for delayed */
    const ring=d.delayed>0
      ?`<circle cx="${p.x}" cy="${p.y}" r="${sz}" fill="${col}" opacity="0">
          <animate attributeName="r" values="${sz};${sz+10};${sz}" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".4;0;.4" dur="2s" repeatCount="indefinite"/>
        </circle>` : '';
    return `<g class="pin"
        onmouseenter="tipDest(event,'${dest}')" onmouseleave="tipOff()"
        onclick="clickDest('${dest}')">
      ${ring}
      <circle cx="${p.x}" cy="${p.y}" r="${sz}" fill="${col}" stroke="#fff" stroke-width="1.5" opacity=".95"/>
      ${d.active>0?`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle"
        font-family="DM Sans,sans-serif" font-size="${sz>8?6.5:5.5}" font-weight="800"
        fill="#fff" pointer-events="none">${d.active}</text>` : ''}
    </g>`;
  }).join('');

  /* ── decorations ── */
  const deco=`
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="1.8" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- coastline hint -->
    <path d="M 44,360 Q 100,385 165,362 Q 210,348 260,355 Q 305,360 350,340"
      stroke="rgba(0,197,163,.2)" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
    <text x="290" y="478" text-anchor="middle"
      font-family="DM Sans,sans-serif" font-size="8" fill="rgba(255,255,255,.12)"
      font-style="italic">Gulf of Guinea</text>
    <!-- country label -->
    <text x="135" y="68" font-family="Syne,sans-serif" font-size="9"
      font-weight="800" fill="rgba(255,255,255,.25)" letter-spacing="3">GHANA</text>
    <!-- compass -->
    <g transform="translate(440,72)" filter="url(#glow)">
      <circle cx="0" cy="0" r="13" fill="#07111fcc" stroke="#ffffff18" stroke-width=".8"/>
      <text x="0" y="-7" text-anchor="middle" font-size="5.5"
        fill="rgba(255,255,255,.65)" font-family="DM Sans,sans-serif" font-weight="700">N</text>
      <path d="M0,-11 L2.5,-2 L0,1 L-2.5,-2 Z" fill="#00c5a3"/>
      <path d="M0,11 L2.5,2 L0,-1 L-2.5,2 Z" fill="#ffffff33"/>
    </g>`;

  svg.innerHTML = deco + paths + labels + pins;
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIP
   ═══════════════════════════════════════════════════════════ */
function showTip(event, title, ac, dl, rv, sub){
  document.getElementById('th').textContent=title;
  document.getElementById('ta').textContent=ac;
  document.getElementById('td2').textContent=dl;
  document.getElementById('tr2').textContent=rv;
  document.getElementById('tf').textContent=sub;
  placeTip(event);
}
function tipRegion(event,id){
  const r=REGIONS.find(x=>x.id===id); if(!r) return;
  const bd2=byDest(); let ac=0,dl=0,rv=0;
  r.dests.forEach(d=>{if(bd2[d]){ac+=bd2[d].active;dl+=bd2[d].delayed;rv+=bd2[d].retrieved;}});
  showTip(event, r.name+' Region', ac, dl, rv,
    'Capital: '+r.cap+' · Sites: '+r.dests.join(', '));
}
function tipDest(event,dest){
  const bd2=byDest(); const d=bd2[dest]||{};
  const reg=REGIONS.find(r=>r.dests.includes(dest));
  showTip(event, '📍 '+dest, d.active||0, d.delayed||0, d.retrieved||0,
    'Region: '+(reg?.name||'–')+' · Unconfirmed: '+(d.unconf||0));
}
function tipOff(){ document.getElementById('tip').classList.remove('on'); }
function placeTip(event){
  const tip=document.getElementById('tip');
  const box=document.getElementById('canvas').getBoundingClientRect();
  let x=event.clientX-box.left+14, y=event.clientY-box.top-18;
  if(x+190>box.width) x=event.clientX-box.left-195;
  if(y<0) y=4; if(y+150>box.height) y=box.height-153;
  tip.style.left=x+'px'; tip.style.top=y+'px'; tip.classList.add('on');
}

/* ═══════════════════════════════════════════════════════════
   SELECTION
   ═══════════════════════════════════════════════════════════ */
function clickRegion(id){
  selRegion = selRegion===id ? null : id;
  renderSVG();
  const reg=REGIONS.find(r=>r.id===id);
  document.querySelectorAll('.di').forEach(el=>
    el.classList.toggle('hi', !!reg?.dests.includes(el.dataset.dest)));
}
function clickDest(dest){
  const rid=D2R[dest]; if(rid) clickRegion(rid);
  else { document.querySelectorAll('.di').forEach(el=>el.classList.toggle('hi',el.dataset.dest===dest)); }
}
function resetAll(){
  selRegion=null; renderSVG(); resetZoom();
  document.querySelectorAll('.di').forEach(el=>el.classList.remove('hi'));
}

/* ═══════════════════════════════════════════════════════════
   ZOOM
   ═══════════════════════════════════════════════════════════ */
function doZoom(f){
  scale=Math.max(.9,Math.min(3.2,scale*f));
  const s=document.getElementById('ghana-svg');
  s.style.transform=`scale(${scale})`;
  s.style.transformOrigin='center center';
}
function resetZoom(){
  scale=1;
  const s=document.getElementById('ghana-svg');
  s.style.transform='scale(1)';
  s.style.transformOrigin='center';
}

/* ═══════════════════════════════════════════════════════════
   FILTER
   ═══════════════════════════════════════════════════════════ */
function setF(f,btn){
  filt=f;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderSVG();
}

/* ═══════════════════════════════════════════════════════════
   MINI STATS
   ═══════════════════════════════════════════════════════════ */
function renderStats(){
  const devs=DB.getDevices();
  const active=devs.filter(d=>d.status!=='Retrieved').length;
  const delayed=devs.filter(d=>d.isDelayed&&d.status!=='Retrieved').length;
  const regs=new Set(devs.filter(d=>d.status!=='Retrieved')
    .map(d=>D2R[d.dest]).filter(Boolean)).size;
  const retrieved=devs.filter(d=>d.status==='Retrieved').length;
  document.getElementById('ms').innerHTML=`
    <div class="mc"><div class="mv" style="color:var(--accent)">${active}</div><div class="ml">Active</div></div>
    <div class="mc"><div class="mv" style="color:var(--red)">${delayed}</div><div class="ml">Delayed</div></div>
    <div class="mc"><div class="mv" style="color:#a855f7">${regs}</div><div class="ml">Regions</div></div>
    <div class="mc"><div class="mv" style="color:var(--navy)">${retrieved}</div><div class="ml">Retrieved</div></div>`;
}

/* ═══════════════════════════════════════════════════════════
   DESTINATION LIST
   ═══════════════════════════════════════════════════════════ */
function renderDests(){
  const bd2=byDest();
  const sorted=DB.DESTS.map(d=>({dest:d,...bd2[d]}))
    .sort((a,b)=>(b.active+b.delayed)-(a.active+a.delayed));
  const totalActive=sorted.reduce((s,d)=>s+d.active,0);
  document.getElementById('dlbl').textContent=totalActive+' active';
  document.getElementById('dlist').innerHTML=sorted.map(item=>{
    const col=item.delayed>0?'#e84040':item.active>5?'#e84040':item.active>2?'#f5c842':item.active>0?'#00c5a3':'var(--border)';
    const reg=REGIONS.find(r=>r.dests.includes(item.dest));
    return `<div class="di" data-dest="${item.dest}" onclick="clickDest('${item.dest}')">
      <div class="di-dot" style="background:${col}"></div>
      <div>
        <div class="di-name">${item.dest}</div>
        <div class="di-reg">${reg?.name||'–'} Region</div>
      </div>
      ${item.active>0?`<span class="badge ba">${item.active}</span>`:''}
      ${item.delayed>0?`<span class="badge bd">⚠${item.delayed}</span>`:''}
    </div>`;
  }).join('');
}

/* ─── boot ─── */
function boot(){
  renderSVG();
  renderStats();
  renderDests();
}
</script>
</body>
</html>
