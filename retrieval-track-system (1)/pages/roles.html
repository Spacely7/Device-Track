<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roles & Users — Retrieval Track</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
.roles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:22px;}
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800;margin-bottom:10px;}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);}
.user-row:last-child{border-bottom:none;}
.user-row-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0;}
.user-row-name{font-weight:700;font-size:13px;}
.user-row-info{font-size:11px;color:var(--text-muted);}
.role-select-inline{padding:4px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:600;background:var(--card);color:var(--text);outline:none;cursor:pointer;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sd-active{background:#00c5a3;}
.sd-inactive{background:#e84040;}
</style>
</head>
<body>
<button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div><div class="page-title">🔐 Roles & Users</div><div class="page-desc">Manage access levels for administrators, supervisors, and officers.</div></div>
    <button class="btn btn-primary btn-sm" onclick="openModal('add-user-modal')">+ Add User</button>
  </div>

  <div class="roles-grid" id="roles-grid"></div>

  <div class="card" style="margin-top:18px;">
    <div class="card-header">
      <div class="card-title">System Users</div>
      <span id="user-count" style="font-size:12px;color:var(--text-muted);"></span>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th></th><th>Name</th><th>Contact</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="user-list"></tbody></table>
    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal-overlay" id="add-user-modal">
    <div class="modal">
      <div class="modal-title">+ Add New User</div>
      <div class="modal-sub">Create a new user account and assign their access role.</div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Full Name</label><input class="form-input" id="new-user-name" placeholder="e.g. Kwame Asante"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Username</label><input class="form-input" id="new-user-uname" placeholder="e.g. kwame"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Phone / Email</label><input class="form-input" id="new-user-contact" placeholder="e.g. 233XXXXXXXXX"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Password</label><input class="form-input" type="password" id="new-user-pass" placeholder="Set a password"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Role</label>
        <select class="form-select" id="new-user-role"><option>Administrator</option><option>Supervisor</option><option>Field Officer</option><option>Retrieval Officer</option></select></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="addUser()">Add User</button>
        <button class="btn btn-outline" onclick="closeModal('add-user-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="edit-user-modal">
    <div class="modal">
      <div class="modal-title">✏️ Edit User</div>
      <input type="hidden" id="edit-user-id">
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Full Name</label><input class="form-input" id="edit-user-name"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Contact</label><input class="form-input" id="edit-user-contact"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">New Password</label><input class="form-input" type="password" id="edit-user-pass" placeholder="Leave blank to keep current"></div>
      <div class="form-group" style="margin-bottom:12px;"><label class="form-label">Role</label>
        <select class="form-select" id="edit-user-role"><option>Administrator</option><option>Supervisor</option><option>Field Officer</option><option>Retrieval Officer</option></select></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveEditUser()">Save Changes</button>
        <button class="btn btn-outline" onclick="closeModal('edit-user-modal')">Cancel</button>
      </div>
    </div>
  </div>
</main>
<div id="toast"></div>
<script src="../js/db.js"></script>
<script src="../js/nav.js"></script>
<script>
const session = DB.requireAuth(['Administrator']);
if (session) { DB.recalcDelays(); buildSidebar('roles'); renderRoles(); renderUsers(); }

const ROLE_DEFS = [
  { name:'Administrator', color:'#e84040', bg:'rgba(232,64,64,.1)', perms:{ Dashboard:true, 'Issue Device':true, 'Field Confirm':true, Retrieval:true, Delayed:true, Reports:true, Analytics:true, Performance:true, 'Roles & Users':true, 'SLA Rules':true, 'Bulk Import':true, SMS:true } },
  { name:'Supervisor',    color:'#1a2b5c', bg:'rgba(26,43,92,.1)',  perms:{ Dashboard:true, 'Issue Device':true, 'Field Confirm':true, Retrieval:true, Delayed:true, Reports:true, Analytics:true, Performance:true, 'Roles & Users':false, 'SLA Rules':false, 'Bulk Import':true, SMS:true } },
  { name:'Retrieval Officer', color:'#007a67', bg:'rgba(0,197,163,.1)', perms:{ Dashboard:true, 'Issue Device':false, 'Field Confirm':false, Retrieval:true, Delayed:true, Reports:false, Analytics:false, Performance:false, 'Roles & Users':false, 'SLA Rules':false, 'Bulk Import':false, SMS:false } },
  { name:'Field Officer', color:'#8a4000', bg:'rgba(240,131,58,.12)', perms:{ Dashboard:true, 'Issue Device':false, 'Field Confirm':true, Retrieval:false, Delayed:false, Reports:false, Analytics:false, Performance:false, 'Roles & Users':false, 'SLA Rules':false, 'Bulk Import':false, SMS:false } },
];

function renderRoles() {
  document.getElementById('roles-grid').innerHTML = ROLE_DEFS.map(r => `
    <div class="role-card">
      <div class="role-badge" style="background:${r.bg};color:${r.color};">● ${r.name}</div>
      ${Object.entries(r.perms).map(([k, v]) => `<div class="role-perm"><span class="${v ? 'perm-yes' : 'perm-no'}">${v ? '✓' : '✗'}</span> ${k}</div>`).join('')}
    </div>`).join('');
}

function renderUsers() {
  const users = DB.getUsers();
  document.getElementById('user-count').textContent = users.length + ' users';
  document.getElementById('user-list').innerHTML = users.map(u => `
    <tr>
      <td><div class="user-row-avatar" style="background:${u.color}">${u.init}</div></td>
      <td><div class="user-row-name">${u.name}</div><div style="font-size:10px;color:var(--text-muted);">@${u.username}</div></td>
      <td class="td-muted">${u.contact}</td>
      <td><span class="badge" style="background:${ROLE_DEFS.find(r=>r.name===u.role)?.bg||'#f0f0f0'};color:${ROLE_DEFS.find(r=>r.name===u.role)?.color||'#333'};border:none;">${u.role}</span></td>
      <td><div style="display:flex;align-items:center;gap:6px;"><div class="status-dot ${u.active ? 'sd-active' : 'sd-inactive'}"></div><span style="font-size:12px;">${u.active ? 'Active' : 'Inactive'}</span></div></td>
      <td class="td-muted">${fmtDate(u.createdAt)}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="editUser('${u.id}')">✏️ Edit</button>
          ${u.id !== session.id ? `<button class="btn btn-sm" style="background:${u.active?'rgba(232,64,64,.1)':'rgba(0,197,163,.1)'};color:${u.active?'var(--red)':'var(--accent)'};border:none;" onclick="toggleUser('${u.id}')">${u.active ? '🔒 Deactivate' : '✅ Activate'}</button>` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function addUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const username = document.getElementById('new-user-uname').value.trim();
  const contact = document.getElementById('new-user-contact').value.trim();
  const password = document.getElementById('new-user-pass').value;
  const role = document.getElementById('new-user-role').value;
  if (!name || !username || !password) { showToast('Fill all required fields', 'error'); return; }
  if (DB.getUsers().find(u => u.username === username)) { showToast('Username already taken', 'error'); return; }
  const colors = ['#1a2b5c','#007a67','#8a4000','#6b00aa','#e84040'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  DB.addUser({ name, username, password, contact, role, color, init: name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() });
  closeModal('add-user-modal');
  showToast(`✅ User ${name} added`, 'success');
  renderUsers();
  document.getElementById('new-user-name').value = '';
  document.getElementById('new-user-uname').value = '';
  document.getElementById('new-user-contact').value = '';
  document.getElementById('new-user-pass').value = '';
}

function editUser(id) {
  const u = DB.getUsers().find(x => x.id === id); if (!u) return;
  document.getElementById('edit-user-id').value = id;
  document.getElementById('edit-user-name').value = u.name;
  document.getElementById('edit-user-contact').value = u.contact;
  document.getElementById('edit-user-role').value = u.role;
  document.getElementById('edit-user-pass').value = '';
  openModal('edit-user-modal');
}

function saveEditUser() {
  const id = document.getElementById('edit-user-id').value;
  const name = document.getElementById('edit-user-name').value.trim();
  const contact = document.getElementById('edit-user-contact').value.trim();
  const role = document.getElementById('edit-user-role').value;
  const pass = document.getElementById('edit-user-pass').value;
  const updates = { name, contact, role, init: name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() };
  if (pass) updates.password = pass;
  DB.updateUser(id, updates);
  DB.addAudit('USER_UPDATED', `User ${name} updated`, session.name, { userId: id });
  closeModal('edit-user-modal');
  showToast('✅ User updated', 'success');
  renderUsers();
}

function toggleUser(id) {
  const u = DB.getUsers().find(x => x.id === id); if (!u) return;
  DB.updateUser(id, { active: !u.active });
  DB.addAudit(u.active ? 'USER_DEACTIVATED' : 'USER_ACTIVATED', `User ${u.name} ${u.active ? 'deactivated' : 'activated'}`, session.name, { userId: id });
  showToast(`User ${u.active ? 'deactivated' : 'activated'}`, 'success');
  renderUsers();
}
</script>
</body>
</html>
