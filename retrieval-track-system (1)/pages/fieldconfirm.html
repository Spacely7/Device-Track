<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Confirmation — Retrieval Track</title>
<link rel="stylesheet" href="../css/shared.css">
</head>
<body>
<button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="page-header">
    <div><div class="page-title">✅ Field Officer Confirmation</div><div class="page-desc">Field Officers confirm device presence at site before entering retrieval queue.</div></div>
    <div class="header-actions">
      <button class="refresh-btn" onclick="render()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:17px;padding:5px;border-radius:7px;">🔄</button>
    </div>
  </div>
  <div class="filter-bar">
    <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" placeholder="Search Device ID, Agency, Regime..." oninput="render()" id="fc-search"></div>
    <select class="filter-select" onchange="render()" id="fc-regime"><option value="">All Regimes</option><option>Warehouse</option><option>Freezones</option><option>Re-Export</option><option>Transit</option><option>Petroleum</option></select>
    <select class="filter-select" onchange="render()" id="fc-status"><option value="">All</option><option value="confirmed">Confirmed</option><option value="pending">Pending</option></select>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Devices Awaiting Field Confirmation</div><span id="fc-count" style="font-size:12px;color:var(--text-muted);"></span></div>
    <div class="table-wrap">
      <table><thead><tr><th>Device ID</th><th>Date Issued</th><th>Agency Name</th><th>Destination</th><th>Regime</th><th>Field Status</th><th>Confirmed By</th><th>Action</th></tr></thead>
      <tbody id="fc-body"></tbody></table>
    </div>
    <div class="pagination"><span id="fc-info"></span><div class="page-btns" id="fc-pages"></div></div>
  </div>
</main>
<div id="toast"></div>
<script src="../js/db.js"></script>
<script src="../js/nav.js"></script>
<script>
const session = DB.requireAuth(['Administrator','Supervisor','Field Officer']);
let curPage = 1;
if (session) { DB.recalcDelays(); buildSidebar('fieldconfirm'); render(); }

function getFiltered() {
  const search = (document.getElementById('fc-search')?.value || '').toLowerCase();
  const regime = document.getElementById('fc-regime')?.value || '';
  const statusF = document.getElementById('fc-status')?.value || '';
  return DB.getDevices().filter(d => {
    if (d.status === 'Retrieved') return false;
    if (regime && d.regime !== regime) return false;
    if (statusF === 'confirmed' && !d.fieldConfirmed) return false;
    if (statusF === 'pending' && d.fieldConfirmed) return false;
    if (search && !d.id.toLowerCase().includes(search) && !d.agency.toLowerCase().includes(search) && !d.regime.toLowerCase().includes(search)) return false;
    return true;
  });
}

function render(pg) {
  if (pg) curPage = pg;
  const filtered = getFiltered();
  const total = filtered.length;
  const start = (curPage - 1) * 10;
  const page = filtered.slice(start, start + 10);
  document.getElementById('fc-count').textContent = `${total} device(s)`;
  document.getElementById('fc-body').innerHTML = page.length
    ? page.map(d => `<tr>
        <td class="td-id" onclick="window.location.href='timeline.html?id=${d.id}'">${d.id}</td>
        <td class="td-muted">${fmtDate(d.issued)}</td>
        <td>${d.agency}</td>
        <td class="td-muted">${d.dest}</td>
        <td>${regBadge(d.regime)}</td>
        <td>${d.fieldConfirmed ? `<span class="badge badge-confirmed">✅ Confirmed</span>` : `<span class="badge badge-pending">⏳ Pending</span>`}</td>
        <td class="td-muted">${d.fieldConfirmedBy || '–'}</td>
        <td>${!d.fieldConfirmed ? `<button class="btn btn-accent btn-sm" onclick="confirmField('${d.id}')">✓ Confirm</button>` : `<span style="font-size:11px;color:var(--text-muted);">Done</span>`}</td>
      </tr>`).join('')
    : `<tr><td colspan="8"><div class="empty-state"><div style="font-size:32px;">✅</div><div>No devices match your filter.</div></div></td></tr>`;
  document.getElementById('fc-info').textContent = `${Math.min(start+1,total)}–${Math.min(start+10,total)} of ${total}`;
  renderPagination('fc', total, curPage, 'render');
}

function confirmField(id) {
  const d = DB.getDevice(id); if (!d) return;
  const officer = session.name;
  const auditLog = [...(d.auditLog || []), { event:'Field Confirmed', detail:`Confirmed by ${officer}`, time: fmtDate(DB.today()), color:'#007a67' }];
  DB.updateDevice(id, { fieldConfirmed: true, fieldConfirmedBy: officer, auditLog });
  DB.addNotification({ type:'retrieved', title:`Field Confirmed – ${id}`, desc:`Device at ${d.agency} confirmed by ${officer}. Now eligible for retrieval.`, officer, agency: d.agency, tag:'assignment' });
  DB.addAudit('FIELD_CONFIRM', `Device ${id} confirmed by ${officer}`, officer, { deviceId: id });
  showToast(`✅ Device ${id} confirmed`, 'success');
  buildSidebar('fieldconfirm');
  render();
}
</script>
</body>
</html>
